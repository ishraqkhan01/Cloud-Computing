<!DOCTYPE html>
<html>

<head>

    <title>
        Flower Classification System
    </title>

</head>

<body>

    <h1>
        Flower Classification System
    </h1>

    <form
        action="/predict"
        method="POST"
        enctype="multipart/form-data">

        <input
            type="file"
            name="image"
            accept="image/*"
            required>

        <button type="submit">

            Predict Flower

        </button>

    </form>

    {% if prediction %}

    <h2>

        Prediction:
        {{ prediction }}

    </h2>

    {% endif %}

</body>

</html>
